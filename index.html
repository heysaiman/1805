<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1805</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    
    <script src="data.js"></script>
    
    <style>
        /* Typography overrides */
        body { 
            font-family: 'Montserrat', sans-serif; 
            perspective: 1000px; /* Enables 3D space */
        }
        .font-playfair { font-family: 'Playfair Display', serif; }
        
        /* 1. Background Image Animation */
        @keyframes ken-burns {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }
        .animate-ken-burns { animation: ken-burns 30s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite alternate; }

        /* 2. The 3-Second Cinematic Blur Overlay */
        .cinematic-blur-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(15, 5, 10, 0.4) 0%, rgba(5, 0, 5, 0.98) 100%);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            opacity: 0;
            animation: fade-in-overlay 2s ease-in-out 3s forwards; 
            z-index: 5;
        }
        @keyframes fade-in-overlay {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* 3. Ultra-Smooth Cinematic Reveals */
        @keyframes subtle-reveal {
            0% { opacity: 0; transform: translateY(40px) scale(0.98); filter: blur(4px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
        .animate-reveal { opacity: 0; animation: subtle-reveal 2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .delay-logo { animation-delay: 3.5s; }
        .delay-title { animation-delay: 3.8s; }
        .delay-together { animation-delay: 4.1s; }
        .delay-synopsis { animation-delay: 4.4s; }
        .delay-ui { animation-delay: 4.8s; }

        /* 4. Champagne Foil Shimmer Text */
        .champagne-foil {
            background: linear-gradient(
                to right, 
                #e6d0a3 20%, 
                #ffffff 40%, 
                #ffffff 60%, 
                #e6d0a3 80%
            );
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 6s linear infinite;
        }
        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* 5. 3D Magnetic Glass Panel */
        .glass-panel {
            background: rgba(20, 15, 18, 0.25);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(230, 208, 163, 0.15);
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.9), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.4s ease;
        }
        
        .text-champagne { color: #e6d0a3; }
        .bg-champagne { background-color: #e6d0a3; }

        /* 6. Stardust Touch Trail */
        @keyframes stardust-fade {
            0% { transform: scale(1) translateY(0); opacity: 1; }
            100% { transform: scale(0) translateY(-30px); opacity: 0; }
        }
        .stardust {
            position: fixed;
            pointer-events: none;
            width: 4px;
            height: 4px;
            background-color: #e6d0a3;
            border-radius: 50%;
            box-shadow: 0 0 10px 2px rgba(230, 208, 163, 0.6);
            animation: stardust-fade 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            z-index: 9999;
        }
    </style>
</head>
<body class="bg-black text-slate-100 min-h-screen relative overflow-x-hidden selection:bg-rose-900 selection:text-white cursor-crosshair">

    <div class="fixed inset-0 z-0 overflow-hidden bg-black">
        <img id="bgImage" src="" alt="Background" class="w-full h-full object-cover object-[center_20%] opacity-90 animate-ken-burns" />
        <div class="cinematic-blur-overlay"></div>
    </div>
    
    <div class="relative z-10 flex flex-col min-h-screen p-6 md:p-12" id="main-container">
        
        <header class="flex justify-between items-center mb-auto animate-reveal delay-logo">
            <h1 class="text-3xl md:text-4xl font-playfair font-black tracking-widest drop-shadow-2xl">
                <span class="text-emerald-500">18</span><span class="text-champagne">05</span>
            </h1>
        </header>

        <main class="max-w-4xl mt-12 mb-auto pointer-events-none">
            <h2 id="heroTitle" class="font-playfair text-6xl md:text-[8rem] leading-none font-medium tracking-tighter champagne-foil mb-4 drop-shadow-[0_10px_20px_rgba(0,0,0,0.8)] uppercase animate-reveal delay-title"></h2>
            
            <p id="togetherText" class="text-emerald-400 font-medium text-xs md:text-lg tracking-[0.5em] uppercase mb-8 drop-shadow-md animate-reveal delay-together"></p>
            
            <p id="synopsisText" class="text-gray-300 text-base md:text-2xl leading-relaxed mb-12 max-w-2xl drop-shadow-lg font-light animate-reveal delay-synopsis"></p>
            
            <div class="flex flex-wrap gap-5 mb-12 animate-reveal delay-ui pointer-events-auto">
                <button class="bg-champagne text-[#0a0508] px-8 py-4 rounded-full font-semibold text-xs md:text-sm tracking-[0.2em] uppercase hover:bg-white transition-all flex items-center gap-3 shadow-[0_0_30px_rgba(230,208,163,0.15)] hover:shadow-[0_0_50px_rgba(230,208,163,0.4)] hover:-translate-y-1 duration-500">
                    <span class="text-lg">▶</span> Play Our Story
                </button>
                <button class="glass-panel text-white px-8 py-4 rounded-full font-semibold text-xs md:text-sm tracking-[0.2em] uppercase hover:bg-white/10 transition-all flex items-center gap-3 hover:-translate-y-1 duration-500 group">
                    <span class="text-champagne group-hover:rotate-180 transition-transform duration-700">✧</span> Moments
                </button>
            </div>
        </main>

        <div class="glass-panel rounded-[2rem] p-6 md:p-10 w-full max-w-5xl mx-auto mt-4 mb-4 animate-reveal delay-ui" id="tilt-card">
            <div class="flex items-center justify-center gap-6 mb-8 transform translate-z-10">
                <div class="h-[1px] w-12 md:w-20 bg-gradient-to-r from-transparent to-champagne/40"></div>
                <p class="text-center text-champagne opacity-90 uppercase tracking-[0.6em] text-[10px] md:text-xs font-semibold">Time Together</p>
                <div class="h-[1px] w-12 md:w-20 bg-gradient-to-l from-transparent to-champagne/40"></div>
            </div>
            
            <div class="grid grid-cols-4 md:grid-cols-7 gap-y-8 gap-x-4 justify-center items-center transform translate-z-20" id="countdown-container">
                </div>
        </div>
    </div>

    <script>
        // --- 1. POPULATE DATA & AUTO-UPDATE TEXT ---
        document.getElementById('bgImage').src = window.websiteData.mainHeroImage;
        document.getElementById('togetherText').innerText = window.websiteData.togetherSinceText;

        const startDate = new Date(window.websiteData.startDate).getTime();
        const startObj = new Date(window.websiteData.startDate);

        function updateClock() {
            const now = new Date().getTime();
            const nowObj = new Date();
            const difference = now - startDate;

            const daysTotal = Math.floor(difference / (1000 * 60 * 60 * 24));
            const years = Math.floor(daysTotal / 365);
            const months = Math.floor((daysTotal % 365) / 30);
            const weeks = Math.floor(((daysTotal % 365) % 30) / 7);
            const days = ((daysTotal % 365) % 30) % 7;
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            let totalMonths = (nowObj.getFullYear() - startObj.getFullYear()) * 12 + (nowObj.getMonth() - startObj.getMonth());
            if (nowObj.getDate() < startObj.getDate()) {
                totalMonths--;
            }
            
            let timeString = totalMonths >= 12 
                ? `${Math.floor(totalMonths / 12)} YEAR${Math.floor(totalMonths / 12) > 1 ? 'S' : ''}` 
                : `${totalMonths} MONTHS`;
                
            document.getElementById('heroTitle').innerText = timeString;
            
            let dynamicSynopsis = window.websiteData.synopsis.replace(/7 months/i, timeString.toLowerCase());
            document.getElementById('synopsisText').innerText = dynamicSynopsis;

            // --- 2. ELEGANT CLOCK RENDERING ---
            const timeUnits = [
                { label: 'Years', value: years },
                { label: 'Months', value: months },
                { label: 'Weeks', value: weeks },
                { label: 'Days', value: days },
                { label: 'Hours', value: hours },
                { label: 'Mins', value: minutes },
                { label: 'Secs', value: seconds, isLive: true }
            ];

            let html = '';
            timeUnits.forEach(unit => {
                const displayValue = unit.value.toString().padStart(2, '0');
                const textStyle = unit.isLive 
                    ? 'text-emerald-300 font-medium drop-shadow-[0_0_15px_rgba(52,211,153,0.5)]' 
                    : 'text-champagne font-light drop-shadow-[0_5px_15px_rgba(230,208,163,0.2)]';

                html += `
                    <div class="flex flex-col items-center justify-center">
                        <span class="font-playfair text-5xl md:text-7xl ${textStyle} transition-all duration-300 tracking-wider">${displayValue}</span>
                        <span class="text-[8px] md:text-xs text-gray-400 mt-3 md:mt-5 uppercase tracking-[0.5em] font-light opacity-70">${unit.label}</span>
                    </div>
                `;
            });

            document.getElementById('countdown-container').innerHTML = html;
        }

        updateClock();
        setInterval(updateClock, 1000);

        // --- 3. MAGNETIC 3D TILT EFFECT ---
        const card = document.getElementById('tilt-card');
        const container = document.getElementById('main-container');

        // Mouse Move for Desktop
        container.addEventListener('mousemove', (e) => {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 40;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 40;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Reset when mouse leaves
        container.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        // Gyroscope/Touch for Mobile
        window.addEventListener('deviceorientation', (e) => {
            let tiltX = Math.max(-15, Math.min(15, e.gamma / 2)); // Left to right
            let tiltY = Math.max(-15, Math.min(15, (e.beta - 45) / 2)); // Front to back
            card.style.transform = `rotateY(${tiltX}deg) rotateX(${-tiltY}deg)`;
        });

        // --- 4. STARDUST TOUCH TRAIL ---
        let isMoving = false;
        let lastSpawnTime = 0;

        function spawnStardust(x, y) {
            const now = Date.now();
            if (now - lastSpawnTime < 30) return; // Prevent spawning too many particles
            lastSpawnTime = now;

            const stardust = document.createElement('div');
            stardust.className = 'stardust';
            
            // Randomize position slightly around the finger
            const offsetX = (Math.random() - 0.5) * 30;
            const offsetY = (Math.random() - 0.5) * 30;
            
            stardust.style.left = (x + offsetX) + 'px';
            stardust.style.top = (y + offsetY) + 'px';
            
            // Randomize size and opacity for natural feel
            const size = Math.random() * 4 + 2;
            stardust.style.width = size + 'px';
            stardust.style.height = size + 'px';
            stardust.style.opacity = Math.random() * 0.5 + 0.5;

            document.body.appendChild(stardust);
            
            // Cleanup after animation
            setTimeout(() => stardust.remove(), 800);
        }

        // Mouse drag
        document.addEventListener('mousemove', (e) => {
            spawnStardust(e.clientX, e.clientY);
        });

        // Phone touch/swipe
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            spawnStardust(touch.clientX, touch.clientY);
        }, { passive: true });

        // Extra burst on click
        document.addEventListener('click', (e) => {
            for(let i=0; i<8; i++) spawnStardust(e.clientX, e.clientY);
        });
        
    </script>
</body>
</html>
