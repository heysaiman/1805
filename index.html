<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1805 | Our Story</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="data.js"></script>
</head>
<body class="bg-[#0a0a0a] text-white selection:bg-[#d4af37] selection:text-black">

    <!-- Background -->
    <div class="fixed inset-0 z-0" id="environment-layer">
        <img id="bgImage" src="" alt="Background" 
             class="w-full h-full object-cover object-center opacity-95 animate-ken-burns" />
        <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-black/60 to-black/90"></div>
    </div>

    <!-- Main Container -->
    <div class="relative z-10 min-h-screen flex flex-col" id="main-ui-layer">

        <!-- Hero Image Area -->
        <div class="flex-1 relative flex items-end" id="hero-area">
            <div class="absolute inset-x-0 bottom-0 h-2/3 bg-gradient-to-t from-black/90 via-black/70 to-transparent z-10"></div>
        </div>

        <!-- Initial Bottom Content -->
        <div class="relative z-20 px-6 pb-12" id="initial-bottom">
            <div class="max-w-4xl mx-auto">
                <div class="foil-text-container mb-2">
                    <h2 class="font-playfair font-bold tracking-[-2px] flex items-baseline gap-4">
                        <span id="heroNumber" class="champagne-foil text-[6.5rem] md:text-[9rem] leading-[0.85]">00</span>
                        <span id="heroLabel" class="champagne-foil text-[2.1rem] md:text-[3.2rem] tracking-[3px] mb-2">MONTHS</span>
                    </h2>
                </div>
                <p id="togetherText" class="text-emerald-400 text-sm md:text-base tracking-[4px] font-semibold uppercase mb-10"></p>
            </div>
        </div>

        <!-- Liquid Glass Sliding Panel -->
        <div id="sliding-panel"
             class="hidden fixed inset-x-0 bottom-0 z-40 max-h-[88vh] rounded-t-[28px] overflow-hidden border border-white/10 shadow-2xl transform translate-y-full transition-all duration-700 ease-out"
             style="background: rgba(15, 15, 18, 0.65); backdrop-filter: blur(28px) saturate(180%); -webkit-backdrop-filter: blur(28px) saturate(180%);">

            <div class="flex justify-center pt-4 pb-2">
                <div class="w-11 h-[5px] rounded-full bg-white/25"></div>
            </div>

            <div class="px-6 pb-10 max-w-4xl mx-auto overflow-y-auto max-h-[82vh]">

                <!-- Full Message -->
                <div class="pt-2 pb-8">
                    <p id="synopsisText" class="text-[17px] md:text-[19px] leading-relaxed text-gray-200 font-light tracking-[-0.1px]"></p>
                </div>

                <!-- Live Timer -->
                <div class="mt-4 mb-8">
                    <div class="flex items-center gap-4 mb-5 px-1">
                        <div class="h-px flex-1 bg-gradient-to-r from-white/10 to-transparent"></div>
                        <span class="text-[10px] tracking-[3px] text-white/60 font-medium">TIME TOGETHER</span>
                        <div class="h-px flex-1 bg-gradient-to-l from-white/10 to-transparent"></div>
                    </div>
                    <div id="countdown-container" class="grid grid-cols-4 md:grid-cols-7 gap-y-9 gap-x-2 justify-center"></div>
                </div>

                <!-- 3 Buttons -->
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 pt-4">
                    <button class="w-full py-[17px] rounded-2xl bg-[#f4e9c8] text-[#111] font-semibold text-sm tracking-widest active:scale-[0.985] transition-all">
                        PLAY OUR STORY
                    </button>
                    <button class="w-full py-[17px] rounded-2xl border border-white/20 text-white font-semibold text-sm tracking-widest active:bg-white/5 transition-all">
                        MOMENTS
                    </button>
                    <button class="w-full py-[17px] rounded-2xl border border-white/20 text-white font-semibold text-sm tracking-widest active:bg-white/5 transition-all">
                        OUR LETTERS
                    </button>
                </div>

            </div>
        </div>

    </div>

    <script src="script.js"></script>
    <script src="audio.js"></script>
</body>
</html>
