<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1805</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <script src="data.js"></script>
    
    <style>
        /* Dark Velvet Gradient Overlay */
        .velvet-overlay {
            background: linear-gradient(to top, rgba(0,0,0,1) 10%, rgba(30,0,15,0.7) 50%, rgba(0,0,0,0.3) 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-black text-slate-100 min-h-screen font-sans relative overflow-x-hidden">

    <div class="absolute inset-0 z-0">
        <img id="bgImage" src="" alt="Background" class="w-full h-full object-cover opacity-80" />
        <div class="absolute inset-0 velvet-overlay"></div>
    </div>

    <div class="relative z-10 flex flex-col min-h-screen p-6 md:p-12">
        
        <header class="flex justify-between items-center mb-auto">
            <h1 class="text-3xl font-bold tracking-wider">
                <span class="text-green-500">18</span><span class="text-[#FFFDD0]">05</span>
            </h1>
        </header>

        <main class="max-w-3xl mt-20 mb-auto">
            <h2 id="heroTitle" class="text-6xl md:text-8xl font-black tracking-tighter text-white mb-2 drop-shadow-lg uppercase"></h2>
            <p id="togetherText" class="text-green-400 font-semibold text-lg md:text-xl tracking-widest uppercase mb-6"></p>
            <p id="synopsisText" class="text-gray-300 text-lg md:text-xl leading-relaxed mb-8 max-w-2xl drop-shadow-md"></p>
            
            <div class="flex gap-4 mb-12">
                <button class="bg-white text-black px-8 py-3 rounded-md font-bold text-lg hover:bg-gray-200 transition flex items-center gap-2">
                    ▶ Play
                </button>
                <button class="glass-panel text-white px-8 py-3 rounded-md font-bold text-lg hover:bg-white/10 transition flex items-center gap-2">
                    ≡ Moments
                </button>
            </div>
        </main>

        <div class="glass-panel rounded-2xl p-6 w-full max-w-4xl mx-auto mt-8 mb-8 shadow-2xl">
            <p class="text-center text-gray-400 uppercase tracking-widest text-sm mb-4">Time Together</p>
            <div class="grid grid-cols-3 md:grid-cols-7 gap-4 text-center" id="countdown-container">
                </div>
        </div>
    </div>

    <script>
        // 1. Load data from data.js
        document.getElementById('bgImage').src = window.websiteData.mainHeroImage;
        document.getElementById('heroTitle').innerText = window.websiteData.heroTitle;
        document.getElementById('togetherText').innerText = window.websiteData.togetherSinceText;
        document.getElementById('synopsisText').innerText = window.websiteData.synopsis;

        // 2. The Continuous Countdown Logic
        const startDate = new Date(window.websiteData.startDate).getTime();

        function updateClock() {
            const now = new Date().getTime();
            const difference = now - startDate;

            // Math to calculate time units
            const daysTotal = Math.floor(difference / (1000 * 60 * 60 * 24));
            const years = Math.floor(daysTotal / 365);
            const months = Math.floor((daysTotal % 365) / 30);
            const weeks = Math.floor(((daysTotal % 365) % 30) / 7);
            const days = ((daysTotal % 365) % 30) % 7;
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // Create the glowing columns
            const timeUnits = [
                { label: 'Years', value: years },
                { label: 'Months', value: months },
                { label: 'Weeks', value: weeks },
                { label: 'Days', value: days },
                { label: 'Hours', value: hours },
                { label: 'Mins', value: minutes },
                { label: 'Secs', value: seconds, isLive: true }
            ];

            let html = '';
            timeUnits.forEach(unit => {
                html += `
                    <div class="flex flex-col items-center justify-center p-2">
                        <span class="text-3xl md:text-4xl font-bold ${unit.isLive ? 'text-[#FFFDD0] animate-pulse' : 'text-white'}">${unit.value}</span>
                        <span class="text-xs text-gray-400 mt-1 uppercase tracking-wider">${unit.label}</span>
                    </div>
                `;
            });

            document.getElementById('countdown-container').innerHTML = html;
        }

        // Run clock immediately, then update every second
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
