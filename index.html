<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1805</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <script src="data.js"></script>
    
    <style>
        /* Typography & Base */
        body { font-family: 'Montserrat', sans-serif; perspective: 1200px; background-color: #050505; }
        .font-playfair { font-family: 'Playfair Display', serif; }
        
        /* 1. Cinematic Background & Blur */
        @keyframes ken-burns { 0% { transform: scale(1); } 100% { transform: scale(1.15); } }
        .animate-ken-burns { animation: ken-burns 35s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite alternate; }
        
        .cinematic-blur-overlay {
            position: absolute; inset: 0; 
            background: linear-gradient(to bottom, rgba(15, 8, 12, 0.4) 0%, rgba(5, 2, 5, 0.95) 100%);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            opacity: 0; animation: fade-in-overlay 2.5s ease-in-out 2.5s forwards; z-index: 5;
        }
        @keyframes fade-in-overlay { 0% { opacity: 0; } 100% { opacity: 1; } }

        /* 2. Ultra-Smooth Cinematic Reveals */
        @keyframes subtle-reveal { 
            0% { opacity: 0; transform: translateY(30px); filter: blur(8px); } 
            100% { opacity: 1; transform: translateY(0); filter: blur(0); } 
        }
        .animate-reveal { opacity: 0; animation: subtle-reveal 2s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        
        .delay-logo { animation-delay: 3.5s; } 
        .delay-title { animation-delay: 3.8s; } 
        .delay-together { animation-delay: 4.1s; } 
        .delay-synopsis { animation-delay: 4.4s; } 
        .delay-ui { animation-delay: 4.8s; }

        /* 3. Luxurious Champagne Foil Text */
        .champagne-foil {
            background: linear-gradient(
                110deg, 
                #d4af37 0%, 
                #fcf3d7 25%, 
                #fff 45%, 
                #fcf3d7 65%, 
                #d4af37 100%
            );
            background-size: 250% auto; 
            color: transparent; 
            -webkit-background-clip: text; 
            background-clip: text; 
            animation: shine 5s linear infinite;
        }
        @keyframes shine { to { background-position: 250% center; } }

        /* 4. The 3D Magnetic Glass Panel */
        .glass-panel {
            position: relative; overflow: hidden; background: rgba(25, 18, 22, 0.35);
            backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(230, 208, 163, 0.15); border-top: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.95), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .glass-panel::before {
            content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); animation: glass-sweep 7s infinite 5s; pointer-events: none;
        }
        @keyframes glass-sweep { 0% { left: -150%; } 20% { left: 200%; } 100% { left: 200%; } }
        
        .text-champagne { color: #fcf3d7; }
        .bg-champagne { background-color: #fcf3d7; }

        /* Number Lock-in Animation */
        #heroNumber { display: inline-block; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .pop-lock { transform: scale(1.15) translateY(-5px); text-shadow: 0 0 40px rgba(212, 175, 55, 0.6); }

        /* 5. Immersive Stardust Physics */
        .stardust {
            position: fixed; pointer-events: none;
            background: radial-gradient(circle, #fff 10%, #d4af37 50%, transparent 100%);
            border-radius: 50%;
            box-shadow: 0 0 20px 4px rgba(212, 175, 55, 0.5);
            animation: stardust-drift 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; z-index: 9999;
            mix-blend-mode: screen;
        }
        @keyframes stardust-drift { 
            0% { transform: scale(1) translate(0, 0); opacity: 1; } 
            100% { transform: scale(0) translate(var(--dx), var(--dy)); opacity: 0; } 
        }

        /* 6. Ambient Floating Dust */
        @keyframes float-up { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 20% { opacity: 0.6;} 80% {opacity: 0.6;} 100% { transform: translateY(-10vh) scale(1.5); opacity: 0; } }
        .ambient-dust {
            position: absolute; width: 3px; height: 3px; background: #d4af37; border-radius: 50%;
            box-shadow: 0 0 10px 2px rgba(212, 175, 55, 0.4); animation: float-up linear infinite; z-index: 2; pointer-events: none;
        }
    </style>
</head>
<body class="bg-black text-slate-100 min-h-screen relative overflow-x-hidden selection:bg-[#d4af37] selection:text-black cursor-crosshair">

    <div class="fixed inset-0 z-0 overflow-hidden bg-black" id="background-container">
        <img id="bgImage" src="" alt="Background" class="w-full h-full object-cover object-[center_20%] opacity-90 animate-ken-burns" />
        <div class="cinematic-blur-overlay"></div>
    </div>
    
    <div class="relative z-10 flex flex-col min-h-screen p-6 md:p-12" id="main-container">
        
        <header class="flex justify-between items-center mb-auto animate-reveal delay-logo">
            <h1 class="text-3xl md:text-4xl font-playfair font-black tracking-widest drop-shadow-2xl">
                <span class="text-emerald-500">18</span><span class="text-champagne">05</span>
            </h1>
        </header>

        <main class="max-w-4xl mt-12 mb-auto pointer-events-none">
            
            <h2 class="font-playfair text-[5.5rem] md:text-[8rem] leading-none font-bold tracking-tighter champagne-foil mb-4 drop-shadow-[0_15px_30px_rgba(0,0,0,0.9)] uppercase animate-reveal delay-title flex items-baseline gap-3 md:gap-5">
                <span id="heroNumber">00</span>
                <span id="heroLabel" class="text-4xl md:text-6xl tracking-widest">MONTHS</span>
            </h2>
            
            <p id="togetherText" class="text-emerald-400 font-medium text-xs md:text-lg tracking-[0.5em] uppercase mb-8 drop-shadow-md animate-reveal delay-together"></p>
            <p id="synopsisText" class="text-gray-300 text-base md:text-2xl leading-relaxed mb-12 max-w-2xl drop-shadow-lg font-light animate-reveal delay-synopsis"></p>
            
            <div class="flex flex-wrap gap-5 mb-12 animate-reveal delay-ui pointer-events-auto">
                <button class="relative bg-champagne text-[#0a0508] px-8 py-4 rounded-full font-bold text-xs md:text-sm tracking-[0.2em] uppercase transition-all flex items-center gap-3 hover:-translate-y-1 duration-500 group overflow-hidden shadow-[0_0_20px_rgba(212,175,55,0.3)] hover:shadow-[0_0_40px_rgba(212,175,55,0.6)]">
                    <span class="text-lg relative z-10 group-hover:scale-110 transition-transform">▶</span> 
                    <span class="relative z-10">Play Our Story</span>
                </button>
                <button class="glass-panel text-white px-8 py-4 rounded-full font-bold text-xs md:text-sm tracking-[0.2em] uppercase hover:bg-white/15 transition-all flex items-center gap-3 hover:-translate-y-1 duration-500 group">
                    <span class="text-champagne group-hover:rotate-180 transition-transform duration-700">✧</span> Moments
                </button>
            </div>
        </main>

        <div class="glass-panel rounded-[2.5rem] p-6 md:p-10 w-full max-w-5xl mx-auto mt-4 mb-4 animate-reveal delay-ui" id="tilt-card">
            <div class="flex items-center justify-center gap-6 mb-10 transform translate-z-10">
                <div class="h-[1px] w-12 md:w-24 bg-gradient-to-r from-transparent to-champagne/50"></div>
                <p class="text-center text-champagne opacity-95 uppercase tracking-[0.6em] text-[10px] md:text-xs font-bold">Time Together</p>
                <div class="h-[1px] w-12 md:w-24 bg-gradient-to-l from-transparent to-champagne/50"></div>
            </div>
            <div class="grid grid-cols-4 md:grid-cols-7 gap-y-10 gap-x-4 justify-center items-center transform translate-z-20" id="countdown-container"></div>
        </div>
    </div>

    <script>
        // Data population
        document.getElementById('bgImage').src = window.websiteData.mainHeroImage;
        document.getElementById('togetherText').innerText = window.websiteData.togetherSinceText;
        
        const startDate = new Date(window.websiteData.startDate).getTime();
        const startObj = new Date(window.websiteData.startDate);
        let titleHasCounted = false; 

        // Core Clock & Math Function
        function updateClock() {
            const now = new Date().getTime();
            const nowObj = new Date();
            const difference = now - startDate;

            const daysTotal = Math.floor(difference / (1000 * 60 * 60 * 24));
            const years = Math.floor(daysTotal / 365);
            const months = Math.floor((daysTotal % 365) / 30);
            const weeks = Math.floor(((daysTotal % 365) % 30) / 7);
            const days = ((daysTotal % 365) % 30) % 7;
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // Month Auto-Updater Logic
            let totalMonths = (nowObj.getFullYear() - startObj.getFullYear()) * 12 + (nowObj.getMonth() - startObj.getMonth());
            if (nowObj.getDate() < startObj.getDate()) totalMonths--;
            
            let isYears = totalMonths >= 12;
            let targetNum = isYears ? Math.floor(totalMonths / 12) : totalMonths;
            let targetLabel = isYears ? `YEAR${Math.floor(totalMonths / 12) > 1 ? 'S' : ''}` : `MONTHS`;
            let paddedTargetNum = String(targetNum).padStart(2, '0');
            
            // Synopsis text auto-update
            document.getElementById('synopsisText').innerText = window.websiteData.synopsis.replace(/7 months|1 year/i, `${targetNum} ${targetLabel.toLowerCase()}`);

            // The Cinematic Slide-in Ticker (Runs Once)
            if (!titleHasCounted) {
                titleHasCounted = true;
                document.getElementById('heroLabel').innerText = targetLabel;
                
                // Triggers right as the title fades in
                setTimeout(() => {
                    let current = 0;
                    let numberEl = document.getElementById('heroNumber');
                    
                    let timer = setInterval(() => {
                        current += 1;
                        numberEl.innerText = String(current).padStart(2, '0');
                        
                        if (current >= targetNum) {
                            clearInterval(timer);
                            numberEl.innerText = paddedTargetNum; 
                            
                            // Luxurious Pop-and-Lock
                            numberEl.classList.add('pop-lock');
                            setTimeout(() => numberEl.classList.remove('pop-lock'), 300);
                        }
                    }, 120); // Smooth counting speed
                }, 3900); 
            } else {
                // Keep it locked if checking updates later
                document.getElementById('heroNumber').innerText = paddedTargetNum;
                document.getElementById('heroLabel').innerText = targetLabel;
            }

            // Elegant Bottom Clock Rendering
            const timeUnits = [
                { label: 'Years', value: years }, { label: 'Months', value: months }, { label: 'Weeks', value: weeks },
                { label: 'Days', value: days }, { label: 'Hours', value: hours }, { label: 'Mins', value: minutes }, { label: 'Secs', value: seconds, isLive: true }
            ];

            let html = '';
            timeUnits.forEach(unit => {
                const displayValue = String(unit.value).padStart(2, '0');
                const textStyle = unit.isLive ? 'text-emerald-300 font-medium drop-shadow-[0_0_15px_rgba(52,211,153,0.5)]' : 'text-champagne font-light drop-shadow-[0_5px_15px_rgba(212,175,55,0.25)]';
                html += `<div class="flex flex-col items-center justify-center"><span class="font-playfair text-5xl md:text-7xl ${textStyle} transition-all duration-300 tracking-wider">${displayValue}</span><span class="text-[9px] md:text-xs text-gray-400 mt-4 uppercase tracking-[0.5em] font-medium opacity-80">${unit.label}</span></div>`;
            });
            document.getElementById('countdown-container').innerHTML = html;
        }

        updateClock(); 
        setInterval(updateClock, 1000);

        // 3D Magnetic Physics
        const card = document.getElementById('tilt-card');
        const container = document.getElementById('main-container');
        
        container.addEventListener('mousemove', (e) => {
            card.style.transform = `rotateY(${(window.innerWidth / 2 - e.pageX) / 45}deg) rotateX(${(window.innerHeight / 2 - e.pageY) / 45}deg)`;
        });
        container.addEventListener('mouseleave', () => card.style.transform = `rotateY(0deg) rotateX(0deg)`);
        window.addEventListener('deviceorientation', (e) => {
            card.style.transform = `rotateY(${Math.max(-15, Math.min(15, e.gamma / 1.5))}deg) rotateX(${-Math.max(-15, Math.min(15, (e.beta - 45) / 1.5))}deg)`;
        });

        // Immersive Stardust Trail
        let lastSpawnTime = 0;
        function spawnStardust(x, y) {
            const now = Date.now();
            if (now - lastSpawnTime < 20) return; // Controls density
            lastSpawnTime = now;
            
            const stardust = document.createElement('div');
            stardust.className = 'stardust';
            
            // Dynamic Scattering
            const offsetX = (Math.random() - 0.5) * 50;
            const offsetY = (Math.random() - 0.5) * 50;
            stardust.style.left = (x + offsetX) + 'px';
            stardust.style.top = (y + offsetY) + 'px';
            
            // Dynamic Physics Variables for CSS
            stardust.style.setProperty('--dx', `${(Math.random() - 0.5) * 120}px`);
            stardust.style.setProperty('--dy', `${(Math.random() - 0.5) * -120 - 40}px`); // Floats outward and upward
            
            // Random sizing for depth
            const size = Math.random() * 5 + 3;
            stardust.style.width = size + 'px';
            stardust.style.height = size + 'px';

            document.body.appendChild(stardust);
            setTimeout(() => stardust.remove(), 1800);
        }
        
        document.addEventListener('mousemove', (e) => spawnStardust(e.clientX, e.clientY));
        document.addEventListener('touchmove', (e) => spawnStardust(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
        
        // Massive burst on click/tap
        document.addEventListener('click', (e) => { 
            for(let i=0; i<25; i++) spawnStardust(e.clientX, e.clientY); 
        });
        
        // Ambient Background Environment
        for(let i=0; i<30; i++) {
            const dust = document.createElement('div');
            dust.className = 'ambient-dust';
            dust.style.left = Math.random() * 100 + 'vw';
            dust.style.animationDuration = (Math.random() * 12 + 15) + 's';
            dust.style.animationDelay = (Math.random() * -20) + 's';
            document.getElementById('background-container').appendChild(dust);
        }
    </script>
</body>
</html>
