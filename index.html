<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1805</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    
    <script src="data.js"></script>
    
    <style>
        /* Typography overrides */
        body { font-family: 'Montserrat', sans-serif; }
        .font-playfair { font-family: 'Playfair Display', serif; }
        
        /* 1. Background Image Animation */
        @keyframes ken-burns {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }
        .animate-ken-burns { animation: ken-burns 25s ease-in-out infinite alternate; }

        /* 2. The 3-Second Cinematic Blur Overlay */
        .cinematic-blur-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(20, 5, 15, 0.5) 0%, rgba(5, 0, 5, 0.95) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            opacity: 0;
            /* Waits 3s, then takes 1.5s to fade into a dark blur */
            animation: fade-in-overlay 1.5s ease-in-out 3s forwards; 
            z-index: 5;
        }
        @keyframes fade-in-overlay {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* 3. Delayed Content Fade-Up */
        @keyframes fade-up {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { opacity: 0; animation: fade-up 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        /* Perfectly timed sequence starting after the blur */
        .delay-logo { animation-delay: 3.5s; }
        .delay-title { animation-delay: 3.8s; }
        .delay-together { animation-delay: 4.1s; }
        .delay-synopsis { animation-delay: 4.4s; }
        .delay-ui { animation-delay: 4.7s; }

        /* High-End Textures */
        .glass-panel {
            background: rgba(15, 10, 12, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(245, 230, 206, 0.08);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        
        .text-champagne { color: #F5E6CE; }
        .bg-champagne { background-color: #F5E6CE; }

        /* Interactive Heart Burst Animation */
        @keyframes heart-float {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -150px) scale(1.5); opacity: 0; }
        }
        .heart-burst {
            position: fixed;
            pointer-events: none;
            font-size: 1.5rem;
            animation: heart-float 1.2s ease-out forwards;
            z-index: 9999;
            filter: drop-shadow(0 0 10px rgba(255, 100, 150, 0.5));
        }
    </style>
</head>
<body class="bg-black text-slate-100 min-h-screen relative overflow-x-hidden selection:bg-rose-900 selection:text-white cursor-pointer">

    <div class="fixed inset-0 z-0 overflow-hidden bg-black">
        <img id="bgImage" src="" alt="Background" class="w-full h-full object-cover object-[center_20%] opacity-90 animate-ken-burns" />
        
        <div class="cinematic-blur-overlay"></div>
    </div>
    
    <div class="relative z-10 flex flex-col min-h-screen p-6 md:p-12">
        
        <header class="flex justify-between items-center mb-auto animate-fade-up delay-logo">
            <h1 class="text-3xl md:text-4xl font-playfair font-black tracking-widest drop-shadow-xl">
                <span class="text-emerald-500">18</span><span class="text-champagne">05</span>
            </h1>
        </header>

        <main class="max-w-4xl mt-16 mb-auto pointer-events-none">
            <h2 id="heroTitle" class="font-playfair text-7xl md:text-[8rem] leading-none font-medium tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-400 mb-4 drop-shadow-2xl uppercase animate-fade-up delay-title"></h2>
            
            <p id="togetherText" class="text-emerald-400 font-medium text-sm md:text-xl tracking-[0.4em] uppercase mb-8 drop-shadow-md animate-fade-up delay-together"></p>
            
            <p id="synopsisText" class="text-gray-300 text-lg md:text-2xl leading-relaxed mb-12 max-w-3xl drop-shadow-lg font-light animate-fade-up delay-synopsis"></p>
            
            <div class="flex flex-wrap gap-6 mb-16 animate-fade-up delay-ui pointer-events-auto">
                <button class="bg-champagne text-black px-10 py-4 rounded-full font-semibold text-sm md:text-base tracking-wider uppercase hover:bg-white transition-all flex items-center gap-3 shadow-[0_0_25px_rgba(245,230,206,0.2)] hover:shadow-[0_0_40px_rgba(245,230,206,0.5)] hover:-translate-y-1 duration-500">
                    <span class="text-lg">▶</span> Play Our Story
                </button>
                <button class="glass-panel text-white px-10 py-4 rounded-full font-semibold text-sm md:text-base tracking-wider uppercase hover:bg-white/10 transition-all flex items-center gap-3 hover:-translate-y-1 duration-500 group">
                    <span class="text-champagne group-hover:rotate-180 transition-transform duration-700">✧</span> Moments
                </button>
            </div>
        </main>

        <div class="glass-panel rounded-[2rem] p-8 w-full max-w-5xl mx-auto mt-4 mb-4 animate-fade-up delay-ui pointer-events-none">
            <div class="flex items-center justify-center gap-6 mb-10">
                <div class="h-[1px] w-16 bg-gradient-to-r from-transparent to-champagne/30"></div>
                <p class="text-center text-champagne opacity-80 uppercase tracking-[0.5em] text-xs font-medium">Time Together</p>
                <div class="h-[1px] w-16 bg-gradient-to-l from-transparent to-champagne/30"></div>
            </div>
            
            <div class="grid grid-cols-4 md:grid-cols-7 gap-6 justify-center items-center" id="countdown-container">
                </div>
        </div>
    </div>

    <script>
        // --- 1. POPULATE DATA & AUTO-UPDATE TEXT ---
        document.getElementById('bgImage').src = window.websiteData.mainHeroImage;
        document.getElementById('togetherText').innerText = window.websiteData.togetherSinceText;

        const startDate = new Date(window.websiteData.startDate).getTime();
        const startObj = new Date(window.websiteData.startDate);

        function updateClock() {
            const now = new Date().getTime();
            const nowObj = new Date();
            const difference = now - startDate;

            const daysTotal = Math.floor(difference / (1000 * 60 * 60 * 24));
            const years = Math.floor(daysTotal / 365);
            const months = Math.floor((daysTotal % 365) / 30);
            const weeks = Math.floor(((daysTotal % 365) % 30) / 7);
            const days = ((daysTotal % 365) % 30) % 7;
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            let totalMonths = (nowObj.getFullYear() - startObj.getFullYear()) * 12 + (nowObj.getMonth() - startObj.getMonth());
            if (nowObj.getDate() < startObj.getDate()) {
                totalMonths--;
            }
            
            let timeString = totalMonths >= 12 
                ? `${Math.floor(totalMonths / 12)} YEAR${Math.floor(totalMonths / 12) > 1 ? 'S' : ''}` 
                : `${totalMonths} MONTHS`;
                
            document.getElementById('heroTitle').innerText = timeString;
            
            let dynamicSynopsis = window.websiteData.synopsis.replace(/7 months/i, timeString.toLowerCase());
            document.getElementById('synopsisText').innerText = dynamicSynopsis;

            // --- 2. ELEGANT CLOCK RENDERING ---
            const timeUnits = [
                { label: 'Years', value: years },
                { label: 'Months', value: months },
                { label: 'Weeks', value: weeks },
                { label: 'Days', value: days },
                { label: 'Hours', value: hours },
                { label: 'Mins', value: minutes },
                { label: 'Secs', value: seconds, isLive: true }
            ];

            let html = '';
            timeUnits.forEach(unit => {
                const displayValue = unit.value.toString().padStart(2, '0');
                const textStyle = unit.isLive 
                    ? 'text-emerald-300 font-medium drop-shadow-[0_0_12px_rgba(52,211,153,0.4)]' 
                    : 'text-champagne font-light drop-shadow-[0_2px_10px_rgba(245,230,206,0.15)]';

                html += `
                    <div class="flex flex-col items-center justify-center">
                        <span class="font-playfair text-5xl md:text-7xl ${textStyle} transition-all duration-300 tracking-wider">${displayValue}</span>
                        <span class="text-[9px] md:text-xs text-gray-400 mt-4 uppercase tracking-[0.4em] font-light opacity-80">${unit.label}</span>
                    </div>
                `;
            });

            document.getElementById('countdown-container').innerHTML = html;
        }

        updateClock();
        setInterval(updateClock, 1000);

        // --- 3. INTERACTIVE HEART BURST EFFECT ---
        function createHeart(x, y) {
            const heart = document.createElement('div');
            const emojis = ['🤍', '✨', '🤍', '🤎']; 
            heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            heart.className = 'heart-burst';
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 1200);
        }

        document.addEventListener('click', function(e) {
            createHeart(e.clientX, e.clientY);
        });

        document.addEventListener('touchstart', function(e) {
            const touch = e.touches[0];
            createHeart(touch.clientX, touch.clientY);
        });
    </script>
</body>
</html>
