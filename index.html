<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1805</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <script src="data.js"></script>
    
    <style>
        /* Typography overrides */
        body { 
            font-family: 'Montserrat', sans-serif; 
            perspective: 1200px;
        }
        .font-playfair { font-family: 'Playfair Display', serif; }
        
        /* 1. Background Image Animation */
        @keyframes ken-burns {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }
        .animate-ken-burns { animation: ken-burns 35s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite alternate; }

        /* 2. The 3-Second Cinematic Blur Overlay */
        .cinematic-blur-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(12, 5, 10, 0.3) 0%, rgba(5, 0, 5, 0.98) 100%);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            opacity: 0;
            animation: fade-in-overlay 2s ease-in-out 3s forwards; 
            z-index: 5;
        }
        @keyframes fade-in-overlay {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* 3. Ultra-Smooth Cinematic Reveals */
        @keyframes subtle-reveal {
            0% { opacity: 0; transform: translateY(40px) scale(0.98); filter: blur(5px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
        .animate-reveal { opacity: 0; animation: subtle-reveal 2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .delay-logo { animation-delay: 3.5s; }
        .delay-title { animation-delay: 3.8s; }
        .delay-together { animation-delay: 4.1s; }
        .delay-synopsis { animation-delay: 4.4s; }
        .delay-ui { animation-delay: 4.8s; }

        /* 4. Champagne Foil Shimmer Text */
        .champagne-foil {
            background: linear-gradient(to right, #e6d0a3 20%, #ffffff 40%, #ffffff 60%, #e6d0a3 80%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 6s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* 5. The Ultimate 3D Magnetic Glass Panel with Light Sweep */
        .glass-panel {
            position: relative;
            overflow: hidden;
            background: rgba(20, 15, 18, 0.25);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(230, 208, 163, 0.15);
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.95), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0; left: -150%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            animation: glass-sweep 8s infinite 5s;
            pointer-events: none;
        }
        @keyframes glass-sweep {
            0% { left: -150%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }
        
        .text-champagne { color: #e6d0a3; }
        .bg-champagne { background-color: #e6d0a3; }

        /* Number Lock-in Animation */
        #heroNumber {
            display: inline-block;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 6. Stardust & Ambient Particles */
        @keyframes stardust-fade {
            0% { transform: scale(1) translateY(0); opacity: 1; }
            100% { transform: scale(0) translateY(-30px); opacity: 0; }
        }
        .stardust {
            position: fixed;
            pointer-events: none;
            width: 4px; height: 4px;
            background-color: #e6d0a3;
            border-radius: 50%;
            box-shadow: 0 0 12px 2px rgba(230, 208, 163, 0.7);
            animation: stardust-fade 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            z-index: 9999;
        }
        
        @keyframes float-up {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        .ambient-dust {
            position: absolute;
            width: 2px; height: 2px;
            background: #e6d0a3;
            border-radius: 50%;
            box-shadow: 0 0 8px 1px rgba(230, 208, 163, 0.5);
            animation: float-up linear infinite;
            z-index: 2;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-black text-slate-100 min-h-screen relative overflow-x-hidden selection:bg-[#e6d0a3] selection:text-black cursor-crosshair">

    <div class="fixed inset-0 z-0 overflow-hidden bg-black" id="background-container">
        <img id="bgImage" src="" alt="Background" class="w-full h-full object-cover object-[center_20%] opacity-90 animate-ken-burns" />
        <div class="cinematic-blur-overlay"></div>
    </div>
    
    <div class="relative z-10 flex flex-col min-h-screen p-6 md:p-12" id="main-container">
        
        <header class="flex justify-between items-center mb-auto animate-reveal delay-logo">
            <h1 class="text-3xl md:text-4xl font-playfair font-black tracking-widest drop-shadow-2xl">
                <span class="text-emerald-500">18</span><span class="text-champagne">05</span>
            </h1>
        </header>

        <main class="max-w-4xl mt-12 mb-auto pointer-events-none">
            <h2 class="font-playfair text-7xl md:text-[8rem] leading-none font-bold tracking-tighter champagne-foil mb-4 drop-shadow-[0_15px_30px_rgba(0,0,0,0.9)] uppercase animate-reveal delay-title flex items-baseline gap-4">
                <span id="heroNumber">0</span>
                <span id="heroLabel">MONTHS</span>
            </h2>
            
            <p id="togetherText" class="text-emerald-400 font-medium text-xs md:text-lg tracking-[0.5em] uppercase mb-8 drop-shadow-md animate-reveal delay-together"></p>
            
            <p id="synopsisText" class="text-gray-300 text-base md:text-2xl leading-relaxed mb-12 max-w-2xl drop-shadow-lg font-light animate-reveal delay-synopsis"></p>
            
            <div class="flex flex-wrap gap-5 mb-12 animate-reveal delay-ui pointer-events-auto">
                <button class="relative bg-champagne text-[#0a0508] px-8 py-4 rounded-full font-bold text-xs md:text-sm tracking-[0.2em] uppercase transition-all flex items-center gap-3 hover:-translate-y-1 duration-500 group overflow-hidden shadow-[0_0_20px_rgba(230,208,163,0.3)] hover:shadow-[0_0_40px_rgba(230,208,163,0.6)]">
                    <span class="text-lg relative z-10">▶</span> 
                    <span class="relative z-10">Play Our Story</span>
                    <div class="absolute inset-0 bg-white opacity-0 group-hover:opacity-20 transition-opacity duration-500 z-0"></div>
                </button>
                <button class="glass-panel text-white px-8 py-4 rounded-full font-bold text-xs md:text-sm tracking-[0.2em] uppercase hover:bg-white/10 transition-all flex items-center gap-3 hover:-translate-y-1 duration-500 group">
                    <span class="text-champagne group-hover:rotate-180 transition-transform duration-700">✧</span> Moments
                </button>
            </div>
        </main>

        <div class="glass-panel rounded-[2rem] p-6 md:p-10 w-full max-w-5xl mx-auto mt-4 mb-4 animate-reveal delay-ui" id="tilt-card">
            <div class="flex items-center justify-center gap-6 mb-8 transform translate-z-10">
                <div class="h-[1px] w-12 md:w-20 bg-gradient-to-r from-transparent to-champagne/40"></div>
                <p class="text-center text-champagne opacity-90 uppercase tracking-[0.6em] text-[10px] md:text-xs font-bold">Time Together</p>
                <div class="h-[1px] w-12 md:w-20 bg-gradient-to-l from-transparent to-champagne/40"></div>
            </div>
            
            <div class="grid grid-cols-4 md:grid-cols-7 gap-y-8 gap-x-4 justify-center items-center transform translate-z-20" id="countdown-container"></div>
        </div>
    </div>

    <script>
        document.getElementById('bgImage').src = window.websiteData.mainHeroImage;
        document.getElementById('togetherText').innerText = window.websiteData.togetherSinceText;

        const startDate = new Date(window.websiteData.startDate).getTime();
        const startObj = new Date(window.websiteData.startDate);
        let titleHasCounted = false; 

        function updateClock() {
            const now = new Date().getTime();
            const nowObj = new Date();
            const difference = now - startDate;

            const daysTotal = Math.floor(difference / (1000 * 60 * 60 * 24));
            const years = Math.floor(daysTotal / 365);
            const months = Math.floor((daysTotal % 365) / 30);
            const weeks = Math.floor(((daysTotal % 365) % 30) / 7);
            const days = ((daysTotal % 365) % 30) % 7;
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            let totalMonths = (nowObj.getFullYear() - startObj.getFullYear()) * 12 + (nowObj.getMonth() - startObj.getMonth());
            if (nowObj.getDate() < startObj.getDate()) totalMonths--;
            
            let isYears = totalMonths >= 12;
            let targetNum = isYears ? Math.floor(totalMonths / 12) : totalMonths;
            let targetLabel = isYears ? `YEAR${Math.floor(totalMonths / 12) > 1 ? 'S' : ''}` : `MONTHS`;
            
            let timeString = `${targetNum} ${targetLabel}`;
            document.getElementById('synopsisText').innerText = window.websiteData.synopsis.replace(/7 months|1 year/i, timeString.toLowerCase());

            if (!titleHasCounted) {
                titleHasCounted = true;
                document.getElementById('heroLabel').innerText = targetLabel;
                setTimeout(() => {
                    let current = 0;
                    let numberEl = document.getElementById('heroNumber');
                    let timer = setInterval(() => {
                        current += 1;
                        numberEl.innerText = current;
                        if (current >= targetNum) {
                            clearInterval(timer);
                            numberEl.innerText = targetNum; 
                            numberEl.style.transform = 'scale(1.15) translateY(-5px)';
                            numberEl.style.textShadow = '0 0 30px rgba(230,208,163,0.8)';
                            setTimeout(() => { numberEl.style.transform = 'scale(1) translateY(0)'; numberEl.style.textShadow = 'none'; }, 200);
                        }
                    }, 90); 
                }, 3800); 
            }

            const timeUnits = [
                { label: 'Years', value: years }, { label: 'Months', value: months }, { label: 'Weeks', value: weeks },
                { label: 'Days', value: days }, { label: 'Hours', value: hours }, { label: 'Mins', value: minutes }, { label: 'Secs', value: seconds, isLive: true }
            ];

            let html = '';
            timeUnits.forEach(unit => {
                const displayValue = unit.value.toString().padStart(2, '0');
                const textStyle = unit.isLive ? 'text-emerald-300 font-medium drop-shadow-[0_0_15px_rgba(52,211,153,0.5)]' : 'text-champagne font-light drop-shadow-[0_5px_15px_rgba(230,208,163,0.3)]';
                html += `<div class="flex flex-col items-center justify-center"><span class="font-playfair text-5xl md:text-7xl ${textStyle} transition-all duration-300 tracking-wider">${displayValue}</span><span class="text-[8px] md:text-xs text-gray-400 mt-3 md:mt-5 uppercase tracking-[0.5em] font-medium opacity-70">${unit.label}</span></div>`;
            });
            document.getElementById('countdown-container').innerHTML = html;
        }

        updateClock(); setInterval(updateClock, 1000);

        const card = document.getElementById('tilt-card');
        const container = document.getElementById('main-container');
        container.addEventListener('mousemove', (e) => {
            card.style.transform = `rotateY(${(window.innerWidth / 2 - e.pageX) / 45}deg) rotateX(${(window.innerHeight / 2 - e.pageY) / 45}deg)`;
        });
        container.addEventListener('mouseleave', () => card.style.transform = `rotateY(0deg) rotateX(0deg)`);
        window.addEventListener('deviceorientation', (e) => {
            card.style.transform = `rotateY(${Math.max(-15, Math.min(15, e.gamma / 2))}deg) rotateX(${-Math.max(-15, Math.min(15, (e.beta - 45) / 2))}deg)`;
        });

        let lastSpawnTime = 0;
        function spawnStardust(x, y) {
            const now = Date.now();
            if (now - lastSpawnTime < 30) return; 
            lastSpawnTime = now;
            const stardust = document.createElement('div');
            stardust.className = 'stardust';
            stardust.style.left = (x + (Math.random() - 0.5) * 40) + 'px';
            stardust.style.top = (y + (Math.random() - 0.5) * 40) + 'px';
            document.body.appendChild(stardust);
            setTimeout(() => stardust.remove(), 800);
        }
        document.addEventListener('mousemove', (e) => spawnStardust(e.clientX, e.clientY));
        document.addEventListener('touchmove', (e) => spawnStardust(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
        document.addEventListener('click', (e) => { for(let i=0; i<12; i++) spawnStardust(e.clientX, e.clientY); });
        
        for(let i=0; i<25; i++) {
            const dust = document.createElement('div');
            dust.className = 'ambient-dust';
            dust.style.left = Math.random() * 100 + 'vw';
            dust.style.animationDuration = (Math.random() * 10 + 15) + 's';
            document.getElementById('background-container').appendChild(dust);
        }
    </script>
</body>
</html>
