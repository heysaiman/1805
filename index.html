<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1805 | Our Story</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <script src="data.js"></script>
</head>
<body class="selection:bg-[#d4af37] selection:text-black cursor-crosshair overflow-x-hidden">

    <div class="fixed inset-0 z-0 overflow-hidden" id="environment-layer">
        <img id="bgImage" src="" alt="Background" class="w-full h-full object-cover object-[center_20%] opacity-90 animate-ken-burns" />
        <div class="cinematic-overlay"></div>
    </div>
    
    <div class="relative z-10 flex flex-col min-h-screen p-6 md:p-12" id="main-ui-layer">
        <header class="flex justify-between items-center mb-auto reveal-element delay-1">
            <h1 class="text-3xl md:text-4xl font-playfair font-black tracking-widest drop-shadow-2xl">
                <span class="text-emerald-500">18</span><span style="color: var(--color-champagne)">05</span>
            </h1>
        </header>

        <main class="max-w-4xl mt-12 mb-auto pointer-events-none relative z-20">
            <div class="foil-text-container mb-4 reveal-element delay-2">
                <h2 class="font-playfair font-bold tracking-tighter uppercase flex items-baseline gap-2 md:gap-4 drop-shadow-2xl">
                    <span id="heroNumber" class="champagne-foil text-[6rem] md:text-[9rem] leading-none">00</span>
                    <span id="heroLabel" class="champagne-foil text-3xl md:text-5xl tracking-[0.2em] mb-2 md:mb-4">MONTHS</span>
                </h2>
            </div>
            <p id="togetherText" class="text-emerald-400 font-semibold text-xs md:text-lg tracking-[0.6em] uppercase mb-8 drop-shadow-md reveal-element delay-3"></p>
            <p id="synopsisText" class="text-gray-300 text-base md:text-2xl leading-relaxed mb-12 max-w-2xl drop-shadow-lg font-light reveal-element delay-4"></p>
            
            <div class="flex flex-wrap gap-5 mb-12 reveal-element delay-5 pointer-events-auto">
                <button class="relative bg-[#fcf3d7] text-[#0a0508] px-10 py-5 rounded-full font-bold text-xs md:text-sm tracking-[0.2em] uppercase transition-all flex items-center gap-4 hover:-translate-y-1 duration-500 group overflow-hidden shadow-[0_0_25px_rgba(212,175,55,0.3)] hover:shadow-[0_0_50px_rgba(212,175,55,0.7)]">
                    <span class="text-xl relative z-10 group-hover:scale-125 transition-transform duration-500 text-emerald-700">▶</span> 
                    <span class="relative z-10">Play Our Story</span>
                    <div class="absolute inset-0 bg-white opacity-0 group-hover:opacity-30 transition-opacity duration-500 z-0"></div>
                </button>
                
                <button id="moments-magic-btn" class="luxury-glass text-white px-10 py-5 rounded-full font-bold text-xs md:text-sm tracking-[0.2em] uppercase hover:bg-white/10 transition-all flex items-center gap-4 hover:-translate-y-1 duration-500 group">
                    <span class="text-[#fcf3d7] text-lg group-hover:rotate-180 transition-transform duration-700">✧</span> 
                    <span>Moments</span>
                </button>
            </div>
        </main>

        <div class="luxury-glass rounded-[2.5rem] p-8 md:p-12 w-full max-w-5xl mx-auto mt-4 mb-4 reveal-element delay-5" id="tilt-card">
            <div class="flex items-center justify-center gap-6 mb-12 transform translate-z-10">
                <div class="h-[1px] w-12 md:w-32 bg-gradient-to-r from-transparent to-[#fcf3d7]/60"></div>
                <p class="text-center text-[#fcf3d7] opacity-90 uppercase tracking-[0.6em] text-[10px] md:text-sm font-bold">Time Together</p>
                <div class="h-[1px] w-12 md:w-32 bg-gradient-to-l from-transparent to-[#fcf3d7]/60"></div>
            </div>
            <div class="grid grid-cols-4 md:grid-cols-7 gap-y-10 gap-x-4 justify-center items-center transform translate-z-20" id="countdown-container">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="audio.js"></script> 

    <!-- ✧ PIXEL-PERFECT NATIVE-GRADE MOMENTS ENGINE ✧ -->
    <script>
        const myMoments = [
            "Our first meet",
            "Our first date",
            "Her birthday 2026",
            "His birthday 2026"
        ];

        document.addEventListener('DOMContentLoaded', () => {
            const originalBtn = document.getElementById('moments-magic-btn');
            if (!originalBtn) return;

            // Global State Variables
            let isAnimating = false;
            let isOpen = false;
            
            // 1. Setup the Blur Overlay
            const overlay = document.createElement('div');
            overlay.className = "fixed inset-0 bg-black/80 backdrop-blur-md pointer-events-none";
            overlay.style.zIndex = "9990";
            overlay.style.opacity = "0";
            overlay.style.transition = "opacity 0.6s ease";
            overlay.style.willChange = "opacity";
            document.body.appendChild(overlay);

            // 2. Setup the "Ghost" Anchor (Maintains layout structure when button moves)
            const ghostAnchor = document.createElement('div');
            ghostAnchor.style.display = "none";
            ghostAnchor.style.visibility = "hidden";
            ghostAnchor.style.pointerEvents = "none";
            originalBtn.parentNode.insertBefore(ghostAnchor, originalBtn);

            const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));

            originalBtn.addEventListener('click', async (e) => {
                e.preventDefault();
                if (isAnimating || isOpen) return;
                isAnimating = true;

                // --- STEP 1: CAPTURE EXACT STARTING PIXELS ---
                const startRect = originalBtn.getBoundingClientRect();
                const startTop = Math.round(startRect.top);
                const startLeft = Math.round(startRect.left);
                const startWidth = Math.round(startRect.width);
                const startHeight = Math.round(startRect.height);

                // Configure Ghost Anchor to hold the physical space
                ghostAnchor.style.width = startWidth + "px";
                ghostAnchor.style.height = startHeight + "px";
                ghostAnchor.style.margin = window.getComputedStyle(originalBtn).margin;
                ghostAnchor.style.display = "block";

                // Hide original button immediately
                originalBtn.style.visibility = "hidden";
                originalBtn.style.opacity = "0";

                // Lock Body Scroll to prevent viewport shifting
                document.body.style.overflow = "hidden";

                // --- STEP 2: CREATE THE GPU-ACCELERATED MORPH BOX ---
                const morphBox = document.createElement('div');
                morphBox.style.position = "fixed";
                morphBox.style.zIndex = "9999";
                
                // Set initial pure pixel coordinates matching the button exactly
                morphBox.style.top = startTop + "px";
                morphBox.style.left = startLeft + "px";
                morphBox.style.width = startWidth + "px";
                morphBox.style.height = startHeight + "px";
                
                // Set initial visual styles matching the button
                morphBox.style.borderRadius = "9999px"; 
                morphBox.style.background = "rgba(255, 255, 255, 0.05)";
                morphBox.style.border = "1px solid rgba(255, 255, 255, 0.1)";
                morphBox.style.backdropFilter = "blur(12px)";
                
                // Hardware Acceleration Flags
                morphBox.style.willChange = "top, left, width, height, border-radius, background-color";
                morphBox.style.transform = "translateZ(0)"; 
                morphBox.style.boxSizing = "border-box";
                morphBox.style.overflow = "hidden";
                
                // Setup an inner container for the initial button text (so we can fade it out smoothly)
                const initialTextWrapper = document.createElement('div');
                initialTextWrapper.style.position = "absolute";
                initialTextWrapper.style.inset = "0";
                initialTextWrapper.style.display = "flex";
                initialTextWrapper.style.alignItems = "center";
                initialTextWrapper.style.justifyContent = "center";
                initialTextWrapper.style.gap = "1rem"; // Match gap-4
                initialTextWrapper.style.opacity = "1";
                initialTextWrapper.style.transition = "opacity 0.2s ease-out";
                initialTextWrapper.innerHTML = originalBtn.innerHTML; 
                morphBox.appendChild(initialTextWrapper);

                document.body.appendChild(morphBox);

                // --- STEP 3: INITIATE SEQUENCE ---
                // Fade in overlay
                overlay.classList.remove('pointer-events-none');
                overlay.style.opacity = "1";

                // Wait 1 frame to ensure the DOM registers the initial box placement
                await new Promise(requestAnimationFrame);

                // Fade out the initial button text inside the morph box
                initialTextWrapper.style.opacity = "0";
                await wait(200); 

                // --- STEP 4: CALCULATE EXACT ENDING PIXELS ---
                // We calculate this right before moving to ensure window size hasn't shifted
                const targetWidth = Math.round(Math.min(window.innerWidth * 0.9, 380));
                const targetHeight = 440;
                const targetTop = Math.round((window.innerHeight - targetHeight) / 2);
                const targetLeft = Math.round((window.innerWidth - targetWidth) / 2);

                // Apply the butter-smooth Apple transition curve
                morphBox.style.transition = "top 0.6s cubic-bezier(0.32, 0.72, 0, 1), left 0.6s cubic-bezier(0.32, 0.72, 0, 1), width 0.6s cubic-bezier(0.32, 0.72, 0, 1), height 0.6s cubic-bezier(0.32, 0.72, 0, 1), border-radius 0.6s cubic-bezier(0.32, 0.72, 0, 1), background-color 0.6s ease";
                
                // Execute physical morph (empty box resizing prevents layout stutter)
                morphBox.style.top = targetTop + "px";
                morphBox.style.left = targetLeft + "px";
                morphBox.style.width = targetWidth + "px";
                morphBox.style.height = targetHeight + "px";
                morphBox.style.borderRadius = "2rem"; 
                morphBox.style.background = "rgba(10, 5, 8, 0.85)";
                morphBox.style.border = "1px solid rgba(252, 243, 215, 0.15)";
                
                // Wait for the physical resize animation to complete completely
                await wait(650);

                // Clean up the initial text wrapper now that the box is big
                initialTextWrapper.remove();

                // --- STEP 5: INJECT AND FADE IN FINAL CONTENT ---
                const contentContainer = document.createElement('div');
                contentContainer.style.width = "100%";
                contentContainer.style.height = "100%";
                contentContainer.style.display = "flex";
                contentContainer.style.flexDirection = "column";
                contentContainer.style.alignItems = "center";
                contentContainer.style.padding = "40px 30px";
                contentContainer.style.opacity = "0";
                contentContainer.style.transition = "opacity 0.4s ease-in";
                
                // Build Header
                const title = document.createElement('h3');
                title.style.color = "#fcf3d7";
                title.style.fontFamily = "'Playfair Display', serif";
                title.style.fontSize = "1.2rem";
                title.style.letterSpacing = "0.3em";
                title.style.marginBottom = "30px";
                title.innerText = "✧ MOMENTS";
                contentContainer.appendChild(title);
                
                // Build List Container
                const list = document.createElement('div');
                list.style.width = "100%";
                list.style.display = "flex";
                list.style.flexDirection = "column";
                list.style.gap = "20px";
                contentContainer.appendChild(list);

                // Build Action Buttons
                const actions = document.createElement('div');
                actions.style.display = "flex";
                actions.style.justifyContent = "space-between";
                actions.style.width = "100%";
                actions.style.marginTop = "auto";
                
                const addBtn = document.createElement('span');
                addBtn.innerHTML = "+ ADD";
                addBtn.style.color = "#10b981"; 
                addBtn.style.fontSize = "12px";
                addBtn.style.letterSpacing = "0.2em";
                addBtn.style.cursor = "pointer";

                const closeBtn = document.createElement('span');
                closeBtn.innerHTML = "CLOSE ✕";
                closeBtn.style.color = "rgba(255,255,255,0.5)";
                closeBtn.style.fontSize = "12px";
                closeBtn.style.letterSpacing = "0.2em";
                closeBtn.style.cursor = "pointer";
                closeBtn.style.padding = "10px"; // Larger touch target
                closeBtn.style.margin = "-10px";
                
                actions.appendChild(addBtn);
                actions.appendChild(closeBtn);
                contentContainer.appendChild(actions);
                
                // Append content and fade it in
                morphBox.appendChild(contentContainer);
                await new Promise(requestAnimationFrame);
                contentContainer.style.opacity = "1";

                await wait(200);

                // --- STEP 6: TYPEWRITER EFFECT ---
                for (let item of myMoments) {
                    let p = document.createElement('p');
                    p.style.fontFamily = "'Montserrat', sans-serif";
                    p.style.fontWeight = "300";
                    p.style.color = "rgba(255,255,255,0.9)";
                    p.style.borderBottom = "1px solid rgba(255,255,255,0.1)";
                    p.style.paddingBottom = "5px";
                    p.style.fontSize = "14px";
                    p.style.width = "100%";
                    p.style.textAlign = "center";
                    p.style.letterSpacing = "0.05em";
                    list.appendChild(p);

                    for (let char of item) {
                        p.innerHTML += char;
                        await wait(20);
                    }
                    await wait(50);
                }

                isAnimating = false;
                isOpen = true;

                // --- REVERSE SEQUENCE (CLOSE) ---
                closeBtn.onclick = async (e) => {
                    e.stopPropagation();
                    if (isAnimating) return;
                    isAnimating = true;

                    // 1. Fade out modal content
                    contentContainer.style.opacity = "0";
                    await wait(300);
                    contentContainer.remove();

                    // 2. Re-create the initial text wrapper (invisible for now)
                    const returnTextWrapper = document.createElement('div');
                    returnTextWrapper.style.position = "absolute";
                    returnTextWrapper.style.inset = "0";
                    returnTextWrapper.style.display = "flex";
                    returnTextWrapper.style.alignItems = "center";
                    returnTextWrapper.style.justifyContent = "center";
                    returnTextWrapper.style.gap = "1rem"; 
                    returnTextWrapper.style.opacity = "0";
                    returnTextWrapper.style.transition = "opacity 0.3s ease-in";
                    returnTextWrapper.innerHTML = originalBtn.innerHTML; 
                    morphBox.appendChild(returnTextWrapper);

                    // 3. Get exact current pixel location of the Ghost Anchor
                    const returnRect = ghostAnchor.getBoundingClientRect();
                    const returnTop = Math.round(returnRect.top);
                    const returnLeft = Math.round(returnRect.left);
                    const returnWidth = Math.round(returnRect.width);
                    const returnHeight = Math.round(returnRect.height);

                    // Fade out the dark background blur
                    overlay.style.opacity = "0";

                    // 4. Execute physical morph back to anchor pixels
                    morphBox.style.top = returnTop + "px";
                    morphBox.style.left = returnLeft + "px";
                    morphBox.style.width = returnWidth + "px";
                    morphBox.style.height = returnHeight + "px";
                    morphBox.style.borderRadius = "9999px"; 
                    morphBox.style.background = "rgba(255, 255, 255, 0.05)";
                    morphBox.style.border = "1px solid rgba(255, 255, 255, 0.1)";
                    
                    await wait(450); // Wait for mostly closed before fading text in

                    // Fade the button text back in as it settles
                    returnTextWrapper.style.opacity = "1";
                    
                    await wait(200);

                    // 5. Seamlessly swap morph box for the real original button
                    morphBox.remove();
                    originalBtn.style.visibility = "visible";
                    originalBtn.style.opacity = "1";
                    ghostAnchor.style.display = "none";

                    // Cleanup states
                    overlay.classList.add('pointer-events-none');
                    document.body.style.overflow = ""; // Unlock scroll
                    
                    isAnimating = false;
                    isOpen = false;
                };
            });
        });
    </script>
</body>
</html>
